<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>kolon</title>
	</head>
	<body>
		<div id="item-area"></div>
		<script>
			document.addEventListener('DOMContentLoaded', function () {
				pageInit();
			});

			const pageInit = async () => {
				await getData();
			};

			async function getData() {
				const r2BucketNm = 'https://pub-ee4d21cc8d0a487da2147fc062da4bf1.r2.dev/';

				try {
					const res = await fetch(`${r2BucketNm}content_map.json`);
					const data = await res.json();
					const itemArea = document.getElementById('item-area');

					for (const key in data) {
						if (data.hasOwnProperty(key)) {
							const item = data[key]; // 현재 항목

							// 새로운 div 생성
							const div = document.createElement('div');
							div.classList.add('item'); // 스타일을 위한 클래스 추가

							// 타입 표시용 div 생성
							const itemType = document.createElement('div');
							itemType.classList.add('item-type');
							itemType.textContent = item.type.toUpperCase(); // 타입을 대문자로 표시

							// 제목 추가
							const itemTitle = document.createElement('div');
							itemTitle.classList.add('item-title');
							itemTitle.textContent = item.title;

							// 클릭 이벤트 추가
							div.addEventListener('click', () => {
								window.open(`${r2BucketNm}${item.src}`, '_blank'); // PDF, Video 등 파일 열기
							});

							// item-area에 타입과 제목을 포함한 div 추가
							div.appendChild(itemType); // 타입 추가
							div.appendChild(itemTitle); // 제목 추가
							itemArea.appendChild(div); // item-area에 추가
						}
					}
				} catch (error) {
					console.error('Error fetching data:', error);
				}
			}
		</script>
		<style>
			/* 전체 아이템 영역 스타일 */
			#item-area {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); /* 카드형 레이아웃 */
				gap: 20px; /* 아이템들 사이 간격 */
				padding: 20px;
				max-width: 1200px;
				margin: 0 auto; /* 가운데 정렬 */
				background-color: #f9f9f9; /* 배경색 */
				border-radius: 10px; /* 모서리 둥글게 */
			}

			/* 각 아이템 스타일 */
			.item {
				background-color: #fff; /* 배경색 */
				padding: 20px;
				border-radius: 10px; /* 모서리 둥글게 */
				box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* 그림자 효과 */
				text-align: center;
				font-size: 18px;
				color: #333; /* 글자 색 */
				cursor: pointer;
				transition: transform 0.3s ease, box-shadow 0.3s ease; /* 클릭 효과 */
				position: relative;
				display: flex;
				flex-direction: column;
				align-items: center; /* 가운데 정렬 */
				justify-content: flex-start; /* 아이템 제목은 아래로 배치 */
				height: 70px; /* 카드 높이 고정 */
			}

			/* 타입을 표시할 영역 스타일 */
			.item-type {
				position: absolute;
				top: 10px;
				display: flex;
				justify-content: center;
				align-items: center;
				background-color: rgba(0, 0, 0, 0.7);
				color: #fff;
				padding: 5px 15px;
				border-radius: 5px;
				font-size: 14px;
				width: auto;
			}

			/* 아이템에 마우스 올릴 때 효과 */
			.item:hover {
				transform: translateY(-5px); /* 살짝 위로 이동 */
				box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2); /* 더 강한 그림자 */
				background-color: #f0f0f0; /* 배경색 변화 */
			}

			/* 제목 스타일 */
			.item-title {
				margin-top: 40px; /* 타입 태그 아래로 제목 배치 */
				font-size: 18px;
				font-weight: bold;
			}

			/* 작은 화면에서 아이템 크기 조정 (반응형) */
			@media (max-width: 768px) {
				#item-area {
					grid-template-columns: 1fr; /* 한 줄로 표시 */
				}
			}
		</style>
	</body>
</html>
